# documentation.

name: AutoTest Studio CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

jobs:

  test:

    name: Build & Test

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if (Test-Path requirements.txt) {
              pip install -r requirements.txt
          }

          pip install pytest
          pip install flake8
          pip install black

      - name: Check Formatting
        run: |
          black --check .

      - name: Run Linter
        run: |
          flake8 .

      - name: Run Unit Tests
        run: |
          pytest

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reports/**
            logs/**
